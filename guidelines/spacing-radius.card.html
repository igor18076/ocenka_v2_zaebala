<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="From inputs (6–8) to cards (12) to pills" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 76px; height: 56px; background: var(--blue-50); box-shadow: inset 0 0 0 1.5px var(--blue-300); }
  .lbl { font-size: 11px; color: var(--text-strong); font-weight: 600; margin-top: 8px; }
  .v { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl">xs</div><div class="v">4px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm</div><div class="v">6px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md</div><div class="v">8px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg · card</div><div class="v">12px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl</div><div class="v">16px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lbl">pill</div><div class="v">999px</div></div>
  </div>
</body>
</html>
