<!-- @dsCard group="Type" viewport="700x170" name="Numerals & money" subtitle="Tabular figures for tables, metrics & value" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .box { }
  .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px; }
  .money { font-size: 30px; font-weight: 700; color: var(--text-value); font-variant-numeric: tabular-nums lining-nums; letter-spacing: -.01em; }
  .rows { font-variant-numeric: tabular-nums lining-nums; color: var(--text-body); font-size: 14px; }
  .rows div { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--divider); }
  .rows b { color: var(--text-strong); font-weight: 600; }
</style>
</head>
<body>
  <div class="grid">
    <div class="box">
      <div class="lbl">Итоговая стоимость</div>
      <div class="money">8 450 000 ₽</div>
      <div style="font-size:13px;color:var(--text-muted);margin-top:6px;font-variant-numeric:tabular-nums">диапазон 8.1 – 8.8 млн ₽</div>
    </div>
    <div class="box">
      <div class="lbl">Tabular alignment</div>
      <div class="rows">
        <div><span>Аналог 1</span><b>112 400 ₽/м²</b></div>
        <div><span>Аналог 2</span><b>98 750 ₽/м²</b></div>
        <div><span>Аналог 3</span><b>121 000 ₽/м²</b></div>
      </div>
    </div>
  </div>
</body>
</html>
