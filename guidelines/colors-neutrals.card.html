<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — graphite" subtitle="Cool graphite ramp for text, surfaces & borders" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--card-ring); }
  .step { flex: 1; height: 64px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .lab { font-family: var(--font-mono); font-size: 10px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--neutral-0)"><span class="lab" style="color:var(--neutral-500)">0</span></div>
    <div class="step" style="background:var(--neutral-50)"><span class="lab" style="color:var(--neutral-500)">50</span></div>
    <div class="step" style="background:var(--neutral-100)"><span class="lab" style="color:var(--neutral-500)">100</span></div>
    <div class="step" style="background:var(--neutral-200)"><span class="lab" style="color:var(--neutral-600)">200</span></div>
    <div class="step" style="background:var(--neutral-300)"><span class="lab" style="color:var(--neutral-700)">300</span></div>
    <div class="step" style="background:var(--neutral-400)"><span class="lab" style="color:var(--neutral-0)">400</span></div>
    <div class="step" style="background:var(--neutral-500)"><span class="lab" style="color:var(--neutral-0)">500</span></div>
    <div class="step" style="background:var(--neutral-600)"><span class="lab" style="color:var(--neutral-0)">600</span></div>
    <div class="step" style="background:var(--neutral-700)"><span class="lab" style="color:var(--neutral-0)">700</span></div>
    <div class="step" style="background:var(--neutral-800)"><span class="lab" style="color:var(--neutral-0)">800</span></div>
    <div class="step" style="background:var(--neutral-900)"><span class="lab" style="color:var(--neutral-0)">900</span></div>
    <div class="step" style="background:var(--neutral-950)"><span class="lab" style="color:var(--neutral-0)">950</span></div>
  </div>
</body>
</html>
