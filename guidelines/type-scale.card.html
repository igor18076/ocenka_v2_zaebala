<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Display, headings & UI roles" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--divider); }
  .line:last-child { border-bottom: none; }
  .tok { width: 92px; flex: none; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .sample { color: var(--text-strong); }
  .d { font-size: var(--text-4xl); font-weight: 800; letter-spacing: -.02em; line-height: 1.1; }
  .h1 { font-size: var(--text-2xl); font-weight: 700; letter-spacing: -.01em; }
  .h2 { font-size: var(--text-xl); font-weight: 600; }
  .h3 { font-size: var(--text-lg); font-weight: 600; }
  .bd { font-size: var(--text-base); font-weight: 400; color: var(--text-body); }
  .ov { font-size: var(--text-2xs); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="line"><span class="tok">Display 38</span><span class="sample d">Оценка недвижимости</span></div>
  <div class="line"><span class="tok">H1 · 24</span><span class="sample h1">Карточка объекта оценки</span></div>
  <div class="line"><span class="tok">H2 · 20</span><span class="sample h2">Подбор аналогов</span></div>
  <div class="line"><span class="tok">H3 · 17</span><span class="sample h3">Сравнительный подход</span></div>
  <div class="line"><span class="tok">Body · 14</span><span class="sample bd">Система собирает данные и формирует отчет с учетом требований ФСО.</span></div>
  <div class="line"><span class="tok">Overline 11</span><span class="sample ov">Итоговая стоимость</span></div>
</body>
</html>
