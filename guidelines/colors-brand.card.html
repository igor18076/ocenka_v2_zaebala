<!-- @dsCard group="Colors" viewport="700x180" name="Brand & accent" subtitle="Deep blue primary, emerald value accent, teal secondary" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 116px; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--card-ring); }
  .chip { height: 56px; }
  .meta { padding: 7px 9px; background: var(--surface-card); }
  .name { font-size: 12px; font-weight: 600; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">Primary</div><div class="hex">#1E4A8F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="name">Primary hover</div><div class="hex">#173A72</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="meta"><div class="name">Brand soft</div><div class="hex">#EEF3FB</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--emerald-500)"></div><div class="meta"><div class="name">Accent / value</div><div class="hex">#109A6A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--emerald-50)"></div><div class="meta"><div class="name">Accent soft</div><div class="hex">#E8F7EF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-500)"></div><div class="meta"><div class="name">Teal</div><div class="hex">#0E9CA3</div></div></div>
  </div>
</body>
</html>
