<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft cool-tinted shadows; cards favor a 1px ring" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 22px; background: var(--surface-app); font-family: var(--font-sans); }
  .row { display: flex; gap: 22px; }
  .item { text-align: center; }
  .box { width: 110px; height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .lbl { font-size: 11px; color: var(--text-strong); font-weight: 600; margin-top: 12px; }
  .v { font-size: 10.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--card-ring)"></div><div class="lbl">ring</div><div class="v">flat card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div><div class="v">resting card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div><div class="v">hover / popover</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div><div class="v">dropdown</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">xl</div><div class="v">modal / dialog</div></div>
  </div>
</body>
</html>
