<!-- @dsCard group="Colors" viewport="700x150" name="Status lifecycle" subtitle="Request states from «Новая» to «Отчет готов»" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-sans); }
  .wrap { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 11px 5px 9px; border-radius: var(--radius-pill);
    font-size: 12.5px; font-weight: 600; line-height: 1;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .arrow { color: var(--text-subtle); font-size: 14px; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="badge" style="background:var(--status-new-bg);color:var(--status-new-fg)"><span class="dot" style="background:var(--status-new-dot)"></span>Новая</span>
    <span class="arrow">›</span>
    <span class="badge" style="background:var(--status-docs-bg);color:var(--status-docs-fg)"><span class="dot" style="background:var(--status-docs-dot)"></span>Документы получены</span>
    <span class="arrow">›</span>
    <span class="badge" style="background:var(--status-analogs-bg);color:var(--status-analogs-fg)"><span class="dot" style="background:var(--status-analogs-dot)"></span>Аналоги подобраны</span>
    <span class="arrow">›</span>
    <span class="badge" style="background:var(--status-calc-bg);color:var(--status-calc-fg)"><span class="dot" style="background:var(--status-calc-dot)"></span>Расчет выполнен</span>
    <span class="arrow">›</span>
    <span class="badge" style="background:var(--status-review-bg);color:var(--status-review-fg)"><span class="dot" style="background:var(--status-review-dot)"></span>На проверке</span>
    <span class="arrow">›</span>
    <span class="badge" style="background:var(--status-ready-bg);color:var(--status-ready-fg)"><span class="dot" style="background:var(--status-ready-dot)"></span>Отчет готов</span>
  </div>
</body>
</html>
