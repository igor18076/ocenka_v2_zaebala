<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .grp { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .grp:last-child { margin-bottom: 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, IconButton } = window.OcenkaPRODesignSystem_7e0e51;
    const I = ({ n }) => <i data-lucide={n}></i>;
    function Demo() {
      return (
        <div>
          <div className="grp">
            <Button variant="primary" iconLeft={<I n="plus" />}>Новая оценка</Button>
            <Button variant="accent" iconLeft={<I n="file-check" />}>Сформировать отчет</Button>
            <Button variant="secondary">Отмена</Button>
            <Button variant="ghost" iconLeft={<I n="sliders-horizontal" />}>Фильтры</Button>
            <Button variant="danger" iconLeft={<I n="trash-2" />}>Удалить</Button>
            <Button variant="link">Подробнее</Button>
          </div>
          <div className="grp">
            <Button size="sm" variant="primary">Small</Button>
            <Button size="md" variant="primary">Medium</Button>
            <Button size="lg" variant="primary">Large</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="grp">
            <IconButton aria-label="Поиск"><I n="search" /></IconButton>
            <IconButton aria-label="Уведомления"><I n="bell" /></IconButton>
            <IconButton aria-label="Ещё" bordered><I n="more-horizontal" /></IconButton>
            <IconButton aria-label="Скачать" bordered><I n="download" /></IconButton>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 0);
  </script>
</body>
</html>
