services:
  ocenka:
    build:
      context: .
    image: ocenka-pro-v2:local
    container_name: ocenka-pro-v2
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4173
      OCENKA_DB_PATH: /app/data/ocenka.sqlite
      OCENKA_SEED_PASSWORD: ${OCENKA_SEED_PASSWORD:?Set OCENKA_SEED_PASSWORD in .env before first start}
      # true behind HTTPS domain (see OCENKA_DOMAIN):
      OCENKA_COOKIE_SECURE: ${OCENKA_COOKIE_SECURE:-false}
      OCENKA_TRUST_PROXY: ${OCENKA_TRUST_PROXY:-true}
    # No public ports — only reachable via the proxy on the Docker network.
    expose:
      - "4173"
    volumes:
      - ocenka_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/healthz').then(async r=>{const j=await r.json().catch(()=>null); process.exit(r.ok&&j&&j.status==='ok'?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  proxy:
    image: caddy:2-alpine
    container_name: ocenka-proxy
    restart: unless-stopped
    depends_on:
      - ocenka
    ports:
      - "80:80"
      - "443:443"
    environment:
      OCENKA_DOMAIN: ${OCENKA_DOMAIN:-}
      OCENKA_ACME_EMAIL: ${OCENKA_ACME_EMAIL:-}
    volumes:
      - ./deploy/caddy-entrypoint.sh:/entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

volumes:
  ocenka_data:
  caddy_data:
  caddy_config:
