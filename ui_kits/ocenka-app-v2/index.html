<!-- @dsCard group="Ocenka App" viewport="1360x840" name="Оценщик PRO v2" subtitle="v2: детальные аналоги, калькулятор с подвкладками, аналитика рынка" -->
<!-- @startingPoint section="Ocenka App" subtitle="Full appraiser web app v2 — analogs modal, calc tabs, market analytics" viewport="1360x840" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Оценка PRO v2 — рабочее пространство оценщика</title>
<link rel="stylesheet" href="../../styles.css">
<script src="vendor/chart.umd.min.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--surface-app); overflow: hidden; }
  #app { height: 100vh; display: flex; }
  .ock-main    { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .ock-content { flex: 1; overflow-y: auto; padding: 28px 32px 48px; }
  .ock-content-inner { width: 100%; max-width: 1320px; margin: 0 auto; box-sizing: border-box; }
  .ock-table-scroll { width: 100%; max-width: 100%; overflow-x: auto; }
  .ock-table-wide { min-width: 900px; }
  .ock-table-scroll > table { min-width: 900px; }
  .ock-calc-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(280px, 300px); gap: 20px; align-items: start; }
  .ock-kpi-grid { min-width: 0; }
  .ock-form-grid { min-width: 0; }
  @media (max-width: 1420px) {
    .ock-calc-layout { grid-template-columns: minmax(0, 1fr); }
    .ock-calc-sidebar { position: static !important; }
  }
  @media (max-width: 900px) {
    .ock-content { padding: 20px 16px 36px; }
    .ock-kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .ock-form-grid { grid-template-columns: minmax(0, 1fr) !important; }
  }
  @media (max-width: 640px) {
    .ock-kpi-grid { grid-template-columns: minmax(0, 1fr) !important; }
  }
  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="vendor/react.development.js"></script>
  <script src="vendor/react-dom.development.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="_shared.jsx"></script>
  <script type="text/babel" src="SidebarV2.jsx"></script>
  <script type="text/babel" src="TopbarV2.jsx"></script>
  <script type="text/babel" src="DashboardScreenV2.jsx"></script>
  <script type="text/babel" src="RequestsScreenV2.jsx"></script>
  <script type="text/babel" src="ObjectScreenV2.jsx"></script>
  <script type="text/babel" src="AnalogsScreenV2.jsx"></script>
  <script type="text/babel" src="CalcScreenV2.jsx"></script>
  <script type="text/babel" src="FsoScreenV2.jsx"></script>
  <script type="text/babel" src="ReportScreenV2.jsx"></script>
  <script type="text/babel" src="MiscScreensV2.jsx"></script>
  <script type="text/babel" src="AnalyticsScreen.jsx"></script>
  <script type="text/babel" src="OnboardingV2.jsx"></script>

  <script type="text/babel" data-presets="react">
    function showBootError(error) {
      const root = document.getElementById('app');
      if (!root || root.childElementCount) return;
      const message = error?.message || String(error || 'Неизвестная ошибка');
      root.innerHTML = `<div style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f4f7fb;color:#111827;font-family:system-ui,sans-serif;box-sizing:border-box"><div style="width:min(100%,620px);background:#fff;border:1px solid #d7dde8;border-radius:8px;padding:22px;box-shadow:0 10px 30px rgba(15,23,42,.12)"><h1 style="margin:0 0 8px;font-size:20px">Ошибка запуска приложения</h1><p style="margin:0 0 14px;color:#5b6472">Обновите страницу с очисткой кеша. Если ошибка повторится, передайте текст ниже.</p><pre style="white-space:pre-wrap;overflow:auto;background:#f8fafc;border:1px solid #e5e7eb;border-radius:6px;padding:12px;font-size:12px;color:#991b1b">${message.replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}</pre></div></div>`;
    }
    window.addEventListener('error', (event) => window.setTimeout(() => showBootError(event.error || event.message), 0));
    window.addEventListener('unhandledrejection', (event) => window.setTimeout(() => showBootError(event.reason), 0));

    function normalizeRequestId(id) {
      return String(id || '').replace(/^ОЗ-/, '03-');
    }

    function normalizeRequestRow(request) {
      return request ? { ...request, id: normalizeRequestId(request.id) } : request;
    }

    function migrateLegacyStorage() {
      if (window.__ocenkaLegacyStorageMigrated) return;
      window.__ocenkaLegacyStorageMigrated = true;
      try {
        const storageKeys = Array.from({ length: window.localStorage.length }, (_, index) => window.localStorage.key(index)).filter(Boolean);
        storageKeys.forEach((key) => {
          if (!key.includes('ОЗ-')) return;
          const nextKey = key.replaceAll('ОЗ-', '03-');
          const nextValue = String(window.localStorage.getItem(key) || '').replaceAll('ОЗ-', '03-');
          if (!window.localStorage.getItem(nextKey)) {
            window.localStorage.setItem(nextKey, nextValue);
          }
          window.localStorage.removeItem(key);
        });
        const kanbanKey = 'ocenka.requests.kanban.v1';
        const rows = JSON.parse(window.localStorage.getItem(kanbanKey) || 'null');
        if (Array.isArray(rows)) {
          window.localStorage.setItem(kanbanKey, JSON.stringify(rows.map(normalizeRequestRow)));
        }
        Array.from({ length: window.localStorage.length }, (_, index) => window.localStorage.key(index))
          .filter((key) => key && key.startsWith('ocenka.calculation.'))
          .forEach((key) => {
            try {
              const saved = JSON.parse(window.localStorage.getItem(key) || 'null');
              if (saved?.cst?.ncsTables) {
                const cost = { ...saved.cst };
                delete cost.ncsTables;
                window.localStorage.setItem(key, JSON.stringify({ ...saved, cst: cost }));
              }
            } catch {}
          });
      } catch {}
    }

    function App() {
      migrateLegacyStorage();
      const [active, setActive] = React.useState('dashboard');
      const [toastMsg, setToastMsg] = React.useState(null);
      const [selectedRequest, setSelectedRequest] = React.useState(() => normalizeRequestRow((window.OcenkaData.requests || []).find((request) => normalizeRequestId(request.id) === normalizeRequestId(window.OcenkaData.object?.id)) || (window.OcenkaData.requests || [])[0] || null));
      const contentRef = React.useRef(null);

      const toast = (msg) => {
        setToastMsg(msg);
        clearTimeout(window.__t);
        window.__t = setTimeout(() => setToastMsg(null), 2600);
      };

      const navigate = (key) => {
        setActive(key);
        if (contentRef.current) contentRef.current.scrollTop = 0;
      };
      const openRequest = (request) => {
        if (request) setSelectedRequest(normalizeRequestRow(request));
        navigate('objects');
      };

      React.useEffect(() => {
        window.ocenkaGoTo = (key) => {
          setActive(key);
          if (contentRef.current) contentRef.current.scrollTop = 0;
        };
      }, []);

      React.useEffect(() => { window.materializeIcons && window.materializeIcons(); });

      const screens = {
        dashboard: <DashboardScreenV2 onOpenRequest={openRequest} onNavigate={navigate} />,
        requests:  <RequestsScreenV2 onOpenRequest={openRequest} />,
        objects:   <ObjectScreenV2 request={selectedRequest} onBack={() => navigate('requests')} onNavigate={navigate} toast={toast} />,
        analogs:   <AnalogsScreenV2 request={selectedRequest} onNavigate={navigate} toast={toast} />,
        calc:      <CalcScreenV2 request={selectedRequest} onNavigate={navigate} toast={toast} />,
        reports:   <ReportScreenV2 request={selectedRequest} toast={toast} />,
        fso:       <FsoScreenV2 request={selectedRequest} onNavigate={navigate} toast={toast} />,
        analytics: <AnalyticsScreen toast={toast} />,
        clients:   <ClientsScreenV2 toast={toast} />,
        settings:  <SettingsScreenV2 toast={toast} />,
      };

      return (
        <React.Fragment>
          <SidebarV2 active={active} onNavigate={navigate} />
          <div className="ock-main">
            <TopbarV2 onNewAppraisal={() => {
              navigate('requests');
              window.setTimeout(() => window.dispatchEvent(new Event('ocenka:create-request')), 0);
            }} />
            <div className="ock-content ds-scroll" ref={contentRef}>
              <div className="ock-content-inner">
                <ContextHelpV2 active={active} />
                {screens[active] || screens.dashboard}
              </div>
            </div>
          </div>
          {toastMsg ? (
            <div style={{
              position:'fixed', right:24, bottom:24, zIndex:50,
              display:'flex', alignItems:'center', gap:10,
              background:'var(--neutral-900)', color:'#fff',
              padding:'12px 16px', borderRadius:'var(--radius-md)',
              boxShadow:'var(--shadow-lg)', fontSize:'var(--text-sm)', fontWeight:500,
              animation:'toastIn .22s var(--ease-out)',
            }}>
              <span style={{ color:'var(--emerald-300)', display:'inline-flex' }}><Icon n="check-circle-2" size={18} /></span>
              {toastMsg}
            </div>
          ) : null}
          <OnboardingV2 active={active} onNavigate={navigate} toast={toast} />
        </React.Fragment>
      );
    }
    try {
      ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    } catch (error) {
      showBootError(error);
    }
    setTimeout(() => window.materializeIcons && window.materializeIcons(), 60);
  </script>
</body>
</html>
