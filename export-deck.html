<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Оценка PRO — UI Kit Slides</title>
<script src="deck-stage.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #000; height: 100%; }
  section { width: 1360px; height: 840px; overflow: hidden; position: relative; background: #F7F8FA; }
  section img { width: 100%; height: 100%; object-fit: cover; object-position: top left; display: block; }
</style>
</head>
<body>
<deck-stage width="1360" height="840">
  <section data-label="Дашборд"><img src="screenshots/01-screens.png" alt="Дашборд"></section>
  <section data-label="Заявки"><img src="screenshots/02-screens.png" alt="Заявки"></section>
  <section data-label="Объект оценки"><img src="screenshots/03-screens.png" alt="Объект оценки"></section>
  <section data-label="Аналоги"><img src="screenshots/04-screens.png" alt="Аналоги"></section>
  <section data-label="Расчет стоимости"><img src="screenshots/05-screens.png" alt="Расчет стоимости"></section>
  <section data-label="Проверка ФСО"><img src="screenshots/06-screens.png" alt="Проверка ФСО"></section>
  <section data-label="Отчет"><img src="screenshots/07-screens.png" alt="Отчет"></section>
  <section data-label="Клиенты"><img src="screenshots/08-screens.png" alt="Клиенты"></section>
  <section data-label="Настройки"><img src="screenshots/09-screens.png" alt="Настройки"></section>
</deck-stage>
</body>
</html>
